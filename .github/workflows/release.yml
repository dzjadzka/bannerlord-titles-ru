name: Release

on:
  workflow_dispatch:
    inputs:
      upload_to_nexus:
        description: "Upload standalone archive to Nexus Mods"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: v1.0.2-ru1
  STANDALONE_ZIP: TitlesRU-v1.0.2-ru1.zip
  PATCH_ZIP: Titles-RU-patch-v1.0.2-ru1.zip

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release archives
        shell: pwsh
        run: |
          Compress-Archive -Path "Modules" -DestinationPath $env:STANDALONE_ZIP -Force

          New-Item -ItemType Directory -Path "tmp/patch/Modules/Titles/ModuleData/Languages/RU" -Force | Out-Null
          Copy-Item -Path "Modules/TitlesRU/ModuleData/Languages/RU/language_data.xml" -Destination "tmp/patch/Modules/Titles/ModuleData/Languages/RU/language_data.xml" -Force
          Copy-Item -Path "Modules/TitlesRU/ModuleData/Languages/RU/std_module_strings_xml.xml" -Destination "tmp/patch/Modules/Titles/ModuleData/Languages/RU/std_module_strings_xml.xml" -Force
          Compress-Archive -Path "tmp/patch/Modules" -DestinationPath $env:PATCH_ZIP -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Titles RU ${{ env.VERSION }}
          files: |
            ${{ env.STANDALONE_ZIP }}
            ${{ env.PATCH_ZIP }}
            validation_report.md
            manifest.json
            nexus.json
          body_path: CHANGELOG.md

      - name: Verify Nexus upload configuration
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_nexus == 'true' }}
        shell: pwsh
        run: |
          if (-not "${{ secrets.API_KEY }}") { throw "Missing GitHub secret: API_KEY" }
          if (-not "${{ secrets.FILE_GROUP_ID }}") { throw "Missing GitHub secret: FILE_GROUP_ID" }

      - name: Upload standalone archive to Nexus Mods
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_nexus == 'true' }}
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.API_KEY }}
          file_group_id: ${{ secrets.FILE_GROUP_ID }}
          filename: ${{ env.STANDALONE_ZIP }}
          version: ${{ env.VERSION }}
          display_name: Titles RU Localization ${{ env.VERSION }}
          description: Russian localization for Titles v1.0.2
          file_category: main
          archive_existing_file: true
          primary_mod_manager_download: true
          allow_mod_manager_download: true
